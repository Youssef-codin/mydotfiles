set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Tmux keys
set -g mouse on
setw -g mode-keys vi

set -g @catppuccin_window_status_style "basic"  # rounded or "slanted", "basic", "none"

set -g window-status-separator ""
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""

set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

set -g @catppuccin_window_text " #{window_name}"
set -g @catppuccin_window_current_text " #{window_name}"

set -g @catppuccin_window_number_color "#5f6380"      # inactive color
set -g @catppuccin_window_text_color "#20212c"        # bg_soft
set -g @catppuccin_window_current_number_color "#7aa2f7"  # blue
set -g @catppuccin_window_current_text_color "#1a1b26"    # bg_alt
set -g @catppuccin_status_background "#16161e"        # bg
set -g @catppuccin_status_module_bg_color "#1a1b26"

run ~/.tmux/plugins/tmux/catppuccin.tmux

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
